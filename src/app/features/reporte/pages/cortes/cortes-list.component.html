<div class="crud-page">

  <div class="crud-header">
    <div class="crud-title">
      <h2>Cortes de caja</h2>
      <small>{{ total() }} corte{{ total() !== 1 ? 's' : '' }}</small>
    </div>
    <div class="crud-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="irACaja()">
        ← Caja
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="reload()">
        Refrescar
      </button>
    </div>
  </div>

  <div *ngIf="banner() as b" class="alert"
       [class.alert-danger]="b.type === 'danger'"
       [class.alert-success]="b.type === 'success'">
    {{ b.text }}
  </div>

  <!-- Filtros -->
  <div class="crud-toolbar">
    <div class="filter-group">
      <label class="form-label mb-1">Mes</label>
      <select class="form-select" [value]="mes()" (change)="onMes($any($event.target).value)">
        <option *ngFor="let m of meses" [value]="m.v">{{ m.l }}</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="form-label mb-1">Año</label>
      <select class="form-select" [value]="anio()" (change)="onAnio($any($event.target).value)">
        <option *ngFor="let a of anios" [value]="a">{{ a }}</option>
      </select>
    </div>

    <div class="filter-group" *ngIf="almacenes().length">
      <label class="form-label mb-1">Almacén</label>
      <select class="form-select" [value]="almacenId() ?? ''" (change)="onAlmacen($any($event.target).value)">
        <option value="">Todos</option>
        <option *ngFor="let a of almacenes()" [value]="a.id">{{ a.descripcion }}</option>
      </select>
    </div>
  </div>

  <!-- Grid -->
  <div class="crud-grid">
    <ag-grid-angular
      class="ag-theme-alpine"
      [theme]="'legacy'"
      style="width: 100%; height: 480px;"
      [rowData]="rows()"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [animateRows]="true"
      [overlayNoRowsTemplate]="overlayNoRowsTemplate"
      [overlayLoadingTemplate]="overlayLoadingTemplate"
      (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)"
    ></ag-grid-angular>
  </div>

</div>
