<div class="crud-page">

  <div class="crud-header">
    <div class="crud-title">
      <h2>Existencias</h2>
      <small>{{ rows().length }} registros</small>
    </div>
    <div class="crud-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="reload()" [disabled]="!almacenId()">
        Refrescar
      </button>
    </div>
  </div>

  <!-- Banner -->
  <div *ngIf="banner() as b" class="alert alert-danger">{{ b.text }}</div>

  <!-- Toolbar -->
  <div class="crud-toolbar">
    <select class="form-select" style="max-width: 220px;"
            [value]="almacenId() ?? ''" (change)="onAlmacen($any($event.target).value)">
      <option value="" disabled>Selecciona un almacén...</option>
      <option *ngFor="let a of almacenes()" [value]="a.id">{{ a.descripcion }}</option>
    </select>

    <div class="form-check form-switch d-flex align-items-center gap-2 ms-1">
      <input class="form-check-input" type="checkbox" role="switch" id="soloConStockSwitch"
             [checked]="soloConStock()" (change)="onSoloConStock($any($event.target).checked)" />
      <label class="form-check-label" for="soloConStockSwitch">Solo con stock</label>
    </div>
  </div>

  <!-- Grid -->
  <div class="crud-grid">
    <ag-grid-angular
      class="ag-theme-alpine"
      [theme]="'legacy'"
      style="width: 100%; height: 560px;"
      [rowData]="rows()"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [animateRows]="true"
      [overlayNoRowsTemplate]="overlayNoRowsTemplate"
      [overlayLoadingTemplate]="overlayLoadingTemplate"
      (gridReady)="onGridReady($event)"
    ></ag-grid-angular>
  </div>

</div>
