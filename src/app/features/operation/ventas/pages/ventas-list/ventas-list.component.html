<div class="crud-page">

  <!-- Encabezado -->
  <div class="crud-header">
    <div class="crud-title">
      <h2>Ventas</h2>
      <small>{{ total() }} resultado{{ total() !== 1 ? 's' : '' }}</small>
    </div>
    <div class="crud-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="reload()">
        Refrescar
      </button>
    </div>
  </div>

  <!-- Banner -->
  <div *ngIf="banner() as b" class="alert"
       [class.alert-success]="b.type === 'success'"
       [class.alert-danger]="b.type === 'danger'"
       [class.alert-info]="b.type === 'info'">
    {{ b.text }}
  </div>

  <!-- Filtros -->
  <form [formGroup]="filtros" class="crud-toolbar">

    <div class="filter-group">
      <label class="form-label mb-1">Almacén</label>
      <select class="form-select" formControlName="almacen_id">
        <option [ngValue]="null">Todos los almacenes</option>
        <option *ngFor="let a of almacenes()" [ngValue]="a.id">
          {{ a.descripcion }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label class="form-label mb-1">Fecha</label>
      <input class="form-control" type="date" formControlName="fecha" />
    </div>

    <div class="filter-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="clearFilters()">
        Limpiar filtros
      </button>
    </div>

  </form>

  <!-- Grid -->
  <div class="crud-grid">
    <ag-grid-angular
      class="ag-theme-alpine"
      [theme]="'legacy'"
      style="width: 100%; height: 540px;"
      [rowData]="rows()"
      [columnDefs]="colDefs"
      [defaultColDef]="defaultColDef"
      [animateRows]="true"
      [overlayNoRowsTemplate]="overlayNoRowsTemplate"
      [overlayLoadingTemplate]="overlayLoadingTemplate"
      (gridReady)="onGridReady($event)"
      (cellClicked)="onCellClicked($event)"
    ></ag-grid-angular>
  </div>

</div>
