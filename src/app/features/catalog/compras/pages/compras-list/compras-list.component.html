<c-row class="g-3">
  <c-col xs="12">
    <c-card>
      <c-card-header class="d-flex align-items-center justify-content-between">
        <div class="fw-semibold">Compras</div>

       
      </c-card-header>

       <button
          cButton
          color="primary"
          (click)="goNew()"
          *hasPermission="'catalogos.crear'"
        >
          Nueva compra
        </button>

      <c-card-body>
        <!-- Filtros -->
        <form [formGroup]="filtros" class="filters mb-3">
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Proveedor</label>
              <select class="form-select" formControlName="proveedor_id">
                <option [ngValue]="null">Todos</option>
                <option *ngFor="let p of proveedores()" [ngValue]="p.id">
                  {{ p.nombre }}
                </option>
              </select>
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Fecha inicio</label>
              <input class="form-control" type="date" formControlName="fecha_inicio" />
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Fecha fin</label>
              <input class="form-control" type="date" formControlName="fecha_fin" />
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Mes</label>
              <input class="form-control" type="number" min="1" max="12" formControlName="mes" />
            </div>

            <div class="col-6 col-md-2">
              <label class="form-label">Año</label>
              <input class="form-control" type="number" min="2000" max="2100" formControlName="anio" />
            </div>

            <div class="col-12 d-flex gap-2">
              <button cButton color="primary" type="button" (click)="applyFilters()">
                Aplicar
              </button>
              <button cButton color="secondary" type="button" (click)="clearFilters()">
                Limpiar
              </button>
            </div>
          </div>
        </form>

        <!-- Tabla -->
        <div class="table-responsive">
          <table cTable class="table align-middle">
            <thead>
              <tr>
                <th style="width: 110px;">ID</th>
                <th>Fecha</th>
                <th>Referencia</th>
                <th>Proveedor</th>
                <th class="text-end">Total</th>
                <th style="width: 120px;">Estatus</th>
                <th style="width: 90px;"></th>
              </tr>
            </thead>

            <tbody>
              <tr *ngIf="loading()">
                <td colspan="7" class="text-center py-4">
                  <c-spinner size="sm"></c-spinner>
                </td>
              </tr>

              <tr *ngFor="let x of items()">
                <td>#{{ x.id }}</td>
                <td>{{ x.fecha }}</td>
                <td>{{ x.referencia }}</td>
                <td>{{ x.proveedor?.nombre || x.proveedor_id }}</td>
                <td class="text-end">{{ x.total | number: '1.2-2' }}</td>
                <td>
                  <c-badge [color]="badge(x.estatus)">
                    {{ labelStatus(x.estatus) }}
                  </c-badge>
                </td>
                <td class="text-end">
                  <button cButton color="light" size="sm" (click)="open(x)">
                    Ver
                  </button>
                </td>
              </tr>

              <tr *ngIf="!loading() && items().length === 0">
                <td colspan="7" class="text-center py-4 text-medium-emphasis">
                  No hay compras para mostrar.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div class="d-flex align-items-center justify-content-between mt-2" *ngIf="hasPaging()">
          <div class="text-medium-emphasis">
            Página {{ page() }} de {{ lastPage() }} — Total: {{ total() }}
          </div>

          <div class="d-flex gap-2">
            <button cButton color="secondary" variant="outline" (click)="prev()" [disabled]="page() <= 1">
              Anterior
            </button>
            <button cButton color="secondary" variant="outline" (click)="next()" [disabled]="page() >= lastPage()">
              Siguiente
            </button>
          </div>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
