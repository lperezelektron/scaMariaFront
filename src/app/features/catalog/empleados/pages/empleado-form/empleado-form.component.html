<div class="form-page">

  <div class="form-header">
    <div>
      <h2 class="m-0">{{ title }}</h2>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="saving()">
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" (click)="submit()" [disabled]="saving()">
        {{ saving() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </div>

  <div *ngIf="loading()" class="alert alert-info">Cargando...</div>

  <form *ngIf="!loading()" [formGroup]="form" class="card form-card" (ngSubmit)="submit()">
    <div class="card-body">
      <div class="row g-3">

        <div class="col-12 col-lg-8">
          <label class="form-label">Nombre</label>
          <input class="form-control"
                 formControlName="nombre"
                 [class.is-invalid]="isInvalid('nombre')"
                 (input)="clearBackendError('nombre')"
                 maxlength="100" />
          <div class="invalid-feedback" *ngIf="errorText('nombre')">{{ errorText('nombre') }}</div>
          <div class="invalid-feedback" *ngIf="backendError('nombre')">{{ backendError('nombre') }}</div>
        </div>

        <div class="col-12 col-lg-2 d-flex align-items-end">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" formControlName="activo" />
            <label class="form-check-label">Activo</label>
          </div>
        </div>

      </div>
    </div>
  </form>

</div>
