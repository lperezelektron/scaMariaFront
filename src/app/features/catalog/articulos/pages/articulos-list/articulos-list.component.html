<div class="crud-page">

  <div class="crud-header">
    <div class="crud-title">
      <h2>Artículos</h2>
      <small>{{ total() }} resultados</small>
    </div>

    <div class="crud-actions">

      <button type="button" class="btn btn-outline-success" (click)="openImport()" *hasPermission="'catalogos.crear'">
        Importar Excel
      </button>

      <input type="file" #fileInput hidden accept=".xlsx, .xls" (change)="onFileSelected($event)" />

      <button type="button" class="btn btn-outline-secondary" (click)="reload()">
        Refrescar
      </button>

      <button type="button" class="btn btn-primary" (click)="goNew()" *hasPermission="'catalogos.crear'">
        Nuevo
      </button>

      <button type="button" class="btn btn-outline-info" (click)="goEdit()" [disabled]="!selectedId()"
        *hasPermission="'catalogos.editar'">
        Editar
      </button>

      <button type="button" class="btn btn-outline-danger" (click)="openDeleteModal()" [disabled]="!selectedId()"
        *hasPermission="'catalogos.eliminar'">
        Eliminar
      </button>

      <button type="button" class="btn btn-outline-secondary" (click)="moveUp()"
        [disabled]="!canMoveUp() || reordering()" *hasPermission="'catalogos.editar'">
        ↑ Subir
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="moveDown()"
        [disabled]="!canMoveDown() || reordering()" *hasPermission="'catalogos.editar'">
        ↓ Bajar
      </button>
    </div>
  </div>

  <!-- Banner (reemplaza alert) -->
  <div *ngIf="banner() as b" class="alert" [class.alert-success]="b.type === 'success'"
    [class.alert-danger]="b.type === 'danger'" [class.alert-info]="b.type === 'info'">
    {{ b.text }}
  </div>

  <!-- Toolbar -->
  <div class="crud-toolbar">
    <input type="text" class="form-control crud-search" placeholder="Buscar (nombre o nombre corto)..."
      [value]="search()" (input)="onSearch($any($event.target).value)" />

    <select class="form-select" [value]="activoFilter()" (change)="onActivo($any($event.target).value)">
      <option value="all">Todos</option>
      <option value="true">Activos</option>
      <option value="false">Inactivos</option>
    </select>

    <select class="form-select" [value]="categoriaId() ?? ''" (change)="onCategoria($any($event.target).value)">
      <option value="">Todas las categorías</option>
      <option *ngFor="let c of categorias()" [value]="c.id">{{ c.descripcion }}</option>
    </select>

    <select class="form-select" [value]="pageSize()" (change)="onPageSize($any($event.target).value)">
      <option [value]="10">10</option>
      <option [value]="25">25</option>
      <option [value]="50">50</option>
      <option [value]="100">100</option>
    </select>

    <div class="crud-pagination">
      <button type="button" class="btn btn-outline-secondary" (click)="prevPage()" [disabled]="page() <= 1">
        Anterior
      </button>
      <span class="crud-pageinfo">Página {{ page() }} / {{ lastPage() }}</span>
      <button type="button" class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="page() >= lastPage()">
        Siguiente
      </button>
    </div>
  </div>

  <!-- Grid -->
  <div class="crud-grid">
    <ag-grid-angular class="ag-theme-alpine" [theme]="'legacy'" style="width: 100%; height: 560px;" [rowData]="rows()"
      [columnDefs]="colDefs" [defaultColDef]="defaultColDef" [rowSelection]="'single'" [animateRows]="true"
      [overlayNoRowsTemplate]="overlayNoRowsTemplate" [overlayLoadingTemplate]="overlayLoadingTemplate"
      (gridReady)="onGridReady($event)" (selectionChanged)="onSelectionChanged($event)"></ag-grid-angular>
  </div>

  <!-- Modal eliminar (CoreUI) -->
  <c-modal [visible]="deleteModalVisible()" (visibleChange)="deleteModalVisible.set($event)">
    <c-modal-header>
      <h5 class="modal-title">Confirmar eliminación</h5>
    </c-modal-header>

    <c-modal-body>
      ¿Seguro que deseas eliminar el artículo seleccionado?
      <div class="text-muted mt-2" style="font-size: 0.9rem;">
        Nota: si tiene movimientos, el backend lo desactivará.
      </div>
    </c-modal-body>

    <c-modal-footer>
      <button cButton color="secondary" variant="outline" (click)="closeDeleteModal()" [disabled]="deleting()">
        Cancelar
      </button>
      <button cButton color="danger" (click)="confirmDelete()" [disabled]="deleting()">
        {{ deleting() ? 'Eliminando...' : 'Eliminar' }}
      </button>
    </c-modal-footer>
  </c-modal>

</div>
