<!--<c-header class="mb-4 d-print-none" position="sticky">-->
<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4 d-flex align-items-center flex-nowrap">
    <button [cSidebarToggle]="sidebarId()" cHeaderToggler class="btn flex-shrink-0" toggle="visible"
      style="margin-inline-start: -14px;" aria-label="Toggle sidebar navigation">
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <div class="nav-chips-container">
      <c-header-nav class="d-none d-md-flex align-items-center gap-2">
        <!-- Rutas fijas -->
        @for (item of fixedRoutes; track item.url) {
        <a 
          [routerLink]="item.url" 
          routerLinkActive="nav-chip-active" 
          [routerLinkActiveOptions]="{exact: false}"
          class="nav-chip nav-chip-fixed">
          {{ item.title }}
        </a>
        }
        
        <!-- Separador visual si hay rutas dinámicas -->
        @if (dynamicRoutes().length > 0) {
        <div class="nav-separator"></div>
        }
        
        <!-- Rutas dinámicas del historial -->
        @for (item of dynamicRoutes(); track item.url) {
        <div class="nav-chip-wrapper">
          <a 
            [routerLink]="item.url" 
            routerLinkActive="nav-chip-active" 
            [routerLinkActiveOptions]="{exact: false}"
            class="nav-chip nav-chip-closable">
            {{ item.title }}
          </a>
          <button 
            type="button" 
            class="btn-close btn-close-danger nav-chip-close" 
            aria-label="Cerrar"
            (click)="removeFromHistory(item.url, $event)"
            title="Cerrar pestaña">
          </button>
        </div>
        }
      </c-header-nav>
    </div>

    <c-header-nav class="ms-auto flex-shrink-0">
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
      <ng-container *ngTemplateOutlet="themeDropdown" />
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
    </c-header-nav>

    <c-header-nav class="mx-0 flex-shrink-0">
      <ng-container *ngTemplateOutlet="userDropdown" />
    </c-header-nav>

  </c-container>
  <c-container [fluid]="true" class="px-4">
    <c-breadcrumb-router />
  </c-container>
</ng-container>
<!--</c-header>-->

<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-start' }" variant="nav-item">
    <button [caret]="false" cDropdownToggle class="py-0 pe-0" aria-label="Open user menu">
      <div class="user-avatar">
        {{ getUserInitials() }}
      </div>
    </button>
    
  </c-dropdown>
</ng-template>

<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Open theme picker">
      <svg cIcon [name]="icons()" size="lg"></svg>
    </button>
    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
      <button (click)="colorMode.set(mode.name)" [active]="colorMode()===mode.name" cDropdownItem
        class="d-flex align-items-center">
        <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
        {{ mode.text }}
      </button>
      }
    </div>
  </c-dropdown>
</ng-template>
